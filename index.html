```html
<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<model-viewer
  id="viewer"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-scale="fixed"
  camera-controls
  auto-rotate
  touch-action="pan-y"
  shadow-intensity="2"
  skybox-height="2m"
  xr-environment
  max-camera-orbit="auto 90deg auto"
  alt="3D product model">
</model-viewer>

<script>
  const params = new URLSearchParams(window.location.search);

  const modelUrl = params.get("model");
  const iosModelUrl = params.get("ios");

  const viewer = document.getElementById("viewer");

  if (modelUrl) {
    viewer.src = modelUrl;
  }

  // Optional USDZ support for iPhone AR
  if (iosModelUrl) {
    viewer.setAttribute("ios-src", iosModelUrl);
  }
</script>

</body>
</html>
```
